<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepWaterFossils</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    /* ── BANNER ── */
    .banner {
      background: #081c25;
      width: 100%;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 0;
      min-height: 200px;
    }

    /* Left block: brand name + DWF + logo stacked, hook below */
    .banner-left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-shrink: 0;
      min-width: 260px;
      height: 100%;
    }

    .brand-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-text-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-name-img {
      height: 36px;
      width: auto;
      display: block;
    }

    .dwf-img {
      height: 44px;
      width: auto;
      display: block;
    }

    .logo-box {
      background: #fff;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-box img {
      height: 100px;
      width: auto;
      display: block;
    }

    .brand-hook-img {
      height: 50px;
      width: auto;
      margin-top: 10px;
      display: block;
    }

    /* Center + right: shaka and dive photo */
    .banner-media {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 32px;
      padding: 0 24px;
    }

    .banner-media img {
      height: 160px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .dive-photo {
      border-radius: 12px;
      overflow: hidden;
    }

    /* ── NAV ROW ── */
    .nav-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 28px 32px 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      border: 1.5px solid #111;
      background: transparent;
      padding: 10px 22px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      color: #111;
      display: inline-block;
      transition: background 0.15s, color 0.15s;
    }

    .nav-btn:hover {
      background: #111;
      color: #fff;
    }

    /* ── SHOP NOW ── */
    .shop-row {
      display: flex;
      justify-content: center;
      padding: 18px 32px 28px;
    }

    .shop-btn {
      border: 1.5px solid #111;
      background: transparent;
      padding: 12px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-decoration: none;
      color: #111;
      display: inline-block;
      transition: background 0.15s, color 0.15s;
    }

    .shop-btn:hover {
      background: #111;
      color: #fff;
    }

    /* ── VIDEO PANELS ── */
    .video-panels {
      display: flex;
      gap: 20px;
      padding: 0 32px 40px;
    }

    .video-panel {
      flex: 1;
      border: 1.5px solid #ccc;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: flex-start;
      padding: 12px 16px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <!-- BANNER -->
  <div class="banner">
    <div class="banner-left">
      <div class="brand-top">
        <div class="brand-text-col">
          <img class="brand-name-img" src="assets/brand-name.png" alt="DeepWaterFossils" />
          <img class="dwf-img" src="assets/dwf.png" alt="DWF" />
        </div>
        <div class="logo-box">
          <img src="assets/logo.png" alt="DWF Logo" />
        </div>
      </div>
      <img class="brand-hook-img" src="assets/brand-hook.png" alt="Real Fossil Shark Teeth. Found. Not Faked." />
    </div>

    <div class="banner-media">
      <img src="assets/nitrox-shaka.png" alt="Shaka" />
      <img class="dive-photo" src="assets/brand-photo.png" alt="Dive Photo" />
    </div>
  </div>

  <!-- NAV BUTTONS -->
  <nav class="nav-row">
    <a href="#" class="nav-btn">Just Discovered</a>
    <a href="#" class="nav-btn">Shark Merch</a>
    <a href="#" class="nav-btn">Discovery Clips</a>
    <a href="#" class="nav-btn">Dive Photos</a>
    <a href="#" class="nav-btn">Dive Videos</a>
  </nav>

  <!-- SHOP NOW -->
  <div class="shop-row">
    <a href="#" class="shop-btn">SHOP NOW</a>
  </div>

  <!-- VIDEO PANELS -->
  <div class="video-panels">
    <div class="video-panel">Looping Discovery Video</div>
    <div class="video-panel">Looping Dive Video</div>
  </div>

</body>
</html>
