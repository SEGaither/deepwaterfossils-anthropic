<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DeepWaterFossils</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #081c25; color: #fff; }
.gold-btn { background: linear-gradient(135deg, #c8960c, #f0c040); color: #000; font-weight: 700; font-size: 14px; letter-spacing: 0.05em; border: none; border-radius: 6px; padding: 11px 32px; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; transition: opacity 0.15s; }
.gold-btn:hover { opacity: 0.85; }
.section-wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 32px; }
.banner { background: #081c25; padding: clamp(16px,2.5vw,32px) 0 0; }
.banner-inner { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 32px; }
.banner-canonical { display: block; width: 100%; height: auto; border-radius: 10px; }
.hero { background: #081c25; text-align: center; padding: clamp(24px,4vw,56px) 32px clamp(32px,5vw,72px); }
.hero h1 { font-size: clamp(22px,3.2vw,40px); font-weight: 800; color: #fff; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
.hero .sub1 { font-size: clamp(14px,1.6vw,20px); color: #fff; margin-bottom: 6px; }
.hero .sub2 { font-size: clamp(12px,1.2vw,16px); color: #bbb; margin-bottom: 28px; }
.section-header { text-align: center; font-size: clamp(14px,1.6vw,20px); font-weight: 700; letter-spacing: 0.14em; margin-bottom: clamp(20px,3vw,40px); }
.section-header.gold { color: #f0c040; }
.section-header.white { color: #fff; }
/* LISTINGS */
.fossils-section { background: #0a2030; padding: clamp(24px,4vw,64px) 0; }
.listings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
.listing-card { background: #081c25; border: 1px solid #1a3a4a; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
.listing-media { position: relative; aspect-ratio: 4/3; overflow: hidden; cursor: pointer; background: #0d3a4a; user-select: none; }
.listing-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
.listing-video { width: 100%; height: 100%; object-fit: cover; display: none; }
.photo-dots { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; pointer-events: none; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.32); transition: background 0.2s; }
.dot.active { background: #f0c040; }
.media-hint { position: absolute; bottom: 8px; right: 10px; font-size: 11px; color: rgba(255,255,255,0.75); pointer-events: none; background: rgba(0,0,0,0.4); padding: 2px 7px; border-radius: 4px; }
.listing-info { padding: 16px 18px 8px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
.listing-size { font-size: clamp(22px,2.5vw,32px); font-weight: 900; color: #f0c040; letter-spacing: 0.02em; }
.listing-grade { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; color: #7ab8cc; text-transform: uppercase; }
.listing-price { font-size: 18px; font-weight: 700; color: #fff; margin-top: 4px; }
.free-ship { font-size: 11px; font-weight: 500; color: #6dbf8a; margin-left: 6px; }
.buy-btn { display: block; margin: 12px 16px 16px; background: linear-gradient(135deg,#c8960c,#f0c040); color: #000; font-weight: 800; font-size: 15px; letter-spacing: 0.08em; border: none; border-radius: 6px; padding: 14px; cursor: pointer; text-decoration: none; text-align: center; transition: opacity 0.15s; }
.buy-btn:hover { opacity: 0.85; }
.buy-btn-disabled { opacity: 0.4; cursor: not-allowed; background: #555; color: #999; }
.pp-wrap { margin: 12px 16px 16px; min-height: 50px; }
.pay-success { margin: 12px 16px 16px; padding: 14px; background: #1e4d2b; border: 1px solid #2ea043; border-radius: 6px; color: #56d364; font-weight: 700; text-align: center; font-size: 14px; }
.see-more-wrap { text-align: center; margin-top: 40px; }
/* HOW FOUND */
.how-found { background: #081c25; padding: clamp(24px,4vw,64px) 0; }
.panels-row { display: flex; gap: 20px; }
.video-card { flex: 1; background: #081c25; border: 1px solid #1a3a4a; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
.video-card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 4px; }
.card-label { font-size: 14px; font-weight: 700; color: #fff; }
.card-sub { font-size: 12px; color: #888; margin-bottom: 10px; flex: 1; }
.gold-btn-full { width: 100%; padding: 10px 16px; }
.video-player-wrap { position: relative; aspect-ratio: 16/9; background: #0d3a4a; overflow: hidden; }
.video-player-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
.video-player-wrap video.fade-out { animation: fadeOut 0.5s forwards; }
.video-player-wrap video.fade-in  { animation: fadeIn  0.5s forwards; }
@keyframes fadeOut { from{opacity:1}to{opacity:0} }
@keyframes fadeIn  { from{opacity:0}to{opacity:1} }
</style>
</head>

// Assign a random video to each card slot once at load
const videoAssign = ALL_LISTINGS.map(function() {
  return VIDEOS[Math.floor(Math.random() * VIDEOS.length)];
});

// ── PRELOAD ALL LISTING PHOTOS ──────────────────────────────────────────────
// Creates Image objects for every photo in every listing immediately at page
// load. The browser fetches and caches them in the background so clicks are
// instant. Objects are kept in the array to prevent garbage collection.
const _preloadCache = [];
ALL_LISTINGS.forEach(function(listing) {
  listing.photos.forEach(function(url) {
    var img = new Image();
    img.src = url;
    _preloadCache.push(img);
  });
});

function buildCard(listing, cardIndex) {
  var sizeMatch = listing.title.match(/([\d.]+)["″]/);
  var size      = sizeMatch ? sizeMatch[1] + '"' : '';
  var video     = videoAssign[cardIndex];
  var photos    = listing.photos;
  var total     = photos.length + 1; // photos + video

  var card = document.createElement('div');
  card.className = 'listing-card';

  var dotsHTML = '';
  for (var d = 0; d < photos.length; d++) {
    dotsHTML += '<span class="dot' + (d === 0 ? ' active' : '') + '"></span>';
  }
  dotsHTML += '<span class="dot"></span>';

  card.innerHTML =
    '<div class="listing-media">' +
      '<img class="listing-photo" src="' + photos[0] + '" alt="' + listing.title + '" />' +
      '<video class="listing-video" src="' + video + '" muted playsinline loop></video>' +
      '<div class="photo-dots">' + dotsHTML + '</div>' +
      '<div class="media-hint">tap to see more &#8250;</div>' +
    '</div>' +
    '<div class="listing-info">' +
      '<div class="listing-size">' + size + '</div>' +
      '<div class="listing-grade">Display Grade</div>' +
      '<div class="listing-price">' + listing.price +
        ' <span class="free-ship">FREE SHIPPING</span>' +
      '</div>' +
    '</div>' +
    '<div class="pp-wrap" data-title="' + listing.title.replace(/"/g, '&quot;') + '" data-amount="' + listing.price.replace('$', '') + '" data-etsy="' + listing.url + '"></div>';

  var media     = card.querySelector('.listing-media');
  var photoEl   = card.querySelector('.listing-photo');
  var vidEl     = card.querySelector('.listing-video');
  var hintEl    = card.querySelector('.media-hint');
  var allDots   = Array.prototype.slice.call(card.querySelectorAll('.dot'));
  var photoDots = allDots.slice(0, photos.length);
  var videoDot  = allDots[photos.length];
  var state = 0;

  function activate(s) {
    state = s;
    photoDots.forEach(function(dot, i) { dot.classList.toggle('active', i === state); });
    videoDot.classList.toggle('active', state === photos.length);
    if (state < photos.length) {
      vidEl.pause();
      vidEl.style.display = 'none';
      photoEl.style.display = 'block';
      photoEl.src = photos[state]; // instant — already cached by preloader
      hintEl.textContent = state < photos.length - 1 ? 'tap to see more \u203a' : 'tap for video \u203a';
    } else {
      photoEl.style.display = 'none';
      vidEl.style.display = 'block';
      vidEl.play();
      hintEl.textContent = 'tap to reset \u203a';
    }
  }

  media.addEventListener('click', function() { activate((state + 1) % total); });
  return card;
}

function showMore() {
  var grid = document.getElementById('listingsGrid');
  var end  = Math.min(shown + PAGE_SIZE, ALL_LISTINGS.length);
  for (var i = shown; i < end; i++) {
    grid.appendChild(buildCard(ALL_LISTINGS[i], i));
  }
  shown = end;
  document.getElementById('seeMoreWrap').style.display =
    shown < ALL_LISTINGS.length ? 'block' : 'none';
  if (window.paypal) renderPayPalButtons();
}

document.getElementById('seeMoreBtn').addEventListener('click', showMore);
showMore();

function showBuyFallback(wrap) {
  var etsy = wrap.getAttribute('data-etsy');
  if (etsy) {
    wrap.innerHTML = '<a href="' + etsy + '" target="_blank" class="buy-btn">BUY ON ETSY</a>';
  } else {
    wrap.innerHTML = '<button class="buy-btn buy-btn-disabled" disabled>Purchase link unavailable</button>';
  }
}

function renderPayPalButton(wrap) {
  if (!window.paypal) { showBuyFallback(wrap); return; }
  var title  = wrap.getAttribute('data-title');
  var amount = wrap.getAttribute('data-amount');
  var etsy   = wrap.getAttribute('data-etsy');

  paypal.Buttons({
    style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'buynow', height: 45 },
    createOrder: function() {
      return fetch('/api/create-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: title, amount: amount })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d.id) throw new Error('no order id');
        return d.id;
      });
    },
    onApprove: function(data) {
      return fetch('/api/capture-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ orderID: data.orderID })
      })
      .then(function(r) { return r.json(); })
      .then(function() {
        wrap.innerHTML = '<div class="pay-success">✓ Payment complete — thank you!</div>';
      });
    },
    onError: function() { showBuyFallback(wrap); }
  }).render(wrap).catch(function() { showBuyFallback(wrap); });
}

function renderPayPalButtons() {
  var wraps = document.querySelectorAll('.pp-wrap:not([data-pp-init])');
  wraps.forEach(function(wrap) {
    wrap.setAttribute('data-pp-init', '1');
    renderPayPalButton(wrap);
  });
}

function showAllFallbacks() {
  document.querySelectorAll('.pp-wrap').forEach(showBuyFallback);
}

fetch('/api/paypal-config')
  .then(function(r) { return r.json(); })
  .then(function(cfg) {
    if (!cfg.clientId) { showAllFallbacks(); return; }
    var s = document.createElement('script');
    s.src = 'https://www.paypal.com/sdk/js?client-id=' + cfg.clientId + '&currency=USD&intent=capture';
    s.onload = renderPayPalButtons;
    s.onerror = showAllFallbacks;
    document.head.appendChild(s);
  })
  .catch(showAllFallbacks);

function createPlayer(videoEl, labelEl, startIndex) {

  videoEl.addEventListener('ended', function() {
    current = (current + 1) % rollingClips.length;
    videoEl.classList.add('fade-out');
    setTimeout(function() {
      videoEl.classList.remove('fade-out');
      load();
      videoEl.classList.add('fade-in');
      setTimeout(function() { videoEl.classList.remove('fade-in'); }, 500);
    }, 480);
  });
  load();
}

createPlayer(document.getElementById('playerA'), document.getElementById('labelA'), 0);
createPlayer(document.getElementById('playerB'), document.getElementById('labelB'), 1);

// ── SECRET EDIT MODE (Ctrl+Shift+E) ─────────────────────────────────────────
(function() {
  var EDIT_ELEMENTS = [
    { id:'banner',       name:'Banner',            sel:'.banner',          color:'#f0c040' },
    { id:'banner-inner', name:'Banner Inner',      sel:'.banner-inner',    color:'#e8a020' },
    { id:'banner-img',   name:'Banner Image',      sel:'.banner-canonical',color:'#ffd166' },
    { id:'fossils',      name:'Fossils Section',   sel:'.fossils-section', color:'#ff7b72' },
    { id:'grid',         name:'Listings Grid',     sel:'.listings-grid',   color:'#ffa657' },
    { id:'how-found',    name:'How Found Section', sel:'.how-found',       color:'#39d353' },
    { id:'panels-row',   name:'Video Panels Row',  sel:'.panels-row',      color:'#26a641' },
    { id:'playerA',      name:'Video Card A',      sel:'.panels-row .video-card:first-child', color:'#58a6ff' },
    { id:'playerB',      name:'Video Card B',      sel:'.panels-row .video-card:last-child',  color:'#388bfd' },
  ];

  var editActive = false;
  var drag = null, rsz = null;
  var sx, sy, st, sl, sw, sh;
  var selected = null;
  var overrides = {};

  // ── STYLES ──
  var styleEl = document.createElement('style');
  styleEl.id = '__dwf_edit_style';
  styleEl.textContent = `
    .__dwf_h { outline: 2px dashed var(--dwf-c,#f0c040) !important; outline-offset:3px; cursor:move !important; user-select:none !important; position:relative !important; }
    .__dwf_h::before { content:attr(data-dwf-name); position:absolute; top:-24px; left:0; background:var(--dwf-c,#f0c040); color:#000; font:700 11px/1 system-ui; padding:4px 8px; border-radius:3px; white-space:nowrap; z-index:999999; pointer-events:none; }
    .__dwf_sel { outline-width:3px !important; outline-color:#fff !important; }
    .__dwf_rh { position:absolute !important; width:16px !important; height:16px !important; background:var(--dwf-c,#f0c040); border:2px solid #000; border-radius:3px; z-index:999999; cursor:se-resize; bottom:-8px; right:-8px; }
    #__dwf_bar { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#161b22; border:1px solid #f0c040; border-radius:10px; padding:10px 20px; display:flex; gap:12px; align-items:center; z-index:9999999; font:700 12px/1 system-ui; color:#f0c040; box-shadow:0 4px 24px rgba(0,0,0,0.7); }
    #__dwf_bar span { color:#8b949e; font-weight:400; font-size:11px; }
    .__dwf_btn { background:#21262d; border:1px solid #30363d; color:#e6edf3; font:600 11px/1 system-ui; padding:6px 12px; border-radius:5px; cursor:pointer; }
    .__dwf_btn:hover { background:#30363d; }
    .__dwf_btn.save { background:linear-gradient(135deg,#c8960c,#f0c040); color:#000; border:none; font-weight:800; }
    .__dwf_info { position:fixed; top:20px; right:20px; background:#161b22; border:1px solid #30363d; border-radius:8px; padding:12px 16px; z-index:9999999; font:600 12px/1 system-ui; color:#e6edf3; min-width:200px; display:none; }
    .__dwf_info .name { color:#f0c040; font-size:13px; margin-bottom:8px; }
    .__dwf_info label { color:#8b949e; font-size:10px; display:block; margin-top:6px; }
    .__dwf_info input { background:#0d1117; border:1px solid #30363d; color:#e6edf3; font:12px monospace; padding:4px 6px; border-radius:3px; width:100%; margin-top:2px; }
    .__dwf_info input:focus { outline:none; border-color:#f0c040; }
  `;

  // ── TOOLBAR ──
  function makeBar() {
    var bar = document.createElement('div');
    bar.id = '__dwf_bar';
    bar.innerHTML = `
      ⚓ EDIT MODE
      <span>Ctrl+Shift+E to exit</span>
      <button class="__dwf_btn" id="__dwf_reset_btn">↺ Reset Selected</button>
      <button class="__dwf_btn" id="__dwf_resetall_btn">↺ Reset All</button>
      <button class="__dwf_btn save" id="__dwf_save_btn">⬇ Download HTML</button>
    `;
    document.body.appendChild(bar);
    document.getElementById('__dwf_reset_btn').onclick = function() { if (selected) resetEl(selected); };
    document.getElementById('__dwf_resetall_btn').onclick = resetAll;
    document.getElementById('__dwf_save_btn').onclick = saveHTML;
  }

  // ── INFO PANEL ──
  function makeInfo() {
    var info = document.createElement('div');
    info.className = '__dwf_info';
    info.id = '__dwf_info';
    info.innerHTML = `
      <div class="name" id="__dwf_info_name"></div>
      <label>TOP (px)</label><input type="text" id="__dwf_top" placeholder="—" />
      <label>LEFT (px)</label><input type="text" id="__dwf_left" placeholder="—" />
      <label>WIDTH (px)</label><input type="text" id="__dwf_width" placeholder="—" />
      <label>HEIGHT (px)</label><input type="text" id="__dwf_height" placeholder="—" />
    `;
    document.body.appendChild(info);
    ['top','left','width','height'].forEach(function(k) {
      document.getElementById('__dwf_'+k).addEventListener('change', function() {
        if (!selected) return;
        applyProp(selected, k, this.value);
      });
    });
  }

  function updateInfo(el, cfg) {
    var info = document.getElementById('__dwf_info');
    if (!info) return;
    info.style.display = el ? 'block' : 'none';
    if (!el || !cfg) return;
    document.getElementById('__dwf_info_name').textContent = cfg.name;
    document.getElementById('__dwf_top').value   = parseFloat(el.style.top)    || '';
    document.getElementById('__dwf_left').value  = parseFloat(el.style.left)   || '';
    document.getElementById('__dwf_width').value = parseFloat(el.style.width)  || '';
    document.getElementById('__dwf_height').value= parseFloat(el.style.height) || '';
  }

  // ── ACTIVATE HANDLES ──
  function activateEl(cfg) {
    var el = document.querySelector(cfg.sel);
    if (!el) return;
    el.classList.add('__dwf_h');
    el.style.setProperty('--dwf-c', cfg.color);
    el.setAttribute('data-dwf-id', cfg.id);
    el.setAttribute('data-dwf-name', cfg.name);
    if (!el.querySelector('.__dwf_rh')) {
      var rh = document.createElement('div');
      rh.className = '__dwf_rh';
      rh.style.setProperty('--dwf-c', cfg.color);
      el.appendChild(rh);
      rh.addEventListener('mousedown', function(e) {
        e.stopPropagation(); e.preventDefault();
        var r = el.getBoundingClientRect();
        rsz = el; sx = e.clientX; sy = e.clientY; sw = r.width; sh = r.height;
      });
    }
    el.addEventListener('mousedown', onMouseDown);
  }

  function deactivateEl(cfg) {
    var el = document.querySelector(cfg.sel);
    if (!el) return;
    el.classList.remove('__dwf_h', '__dwf_sel');
    el.removeAttribute('data-dwf-id');
    el.removeAttribute('data-dwf-name');
    var rh = el.querySelector('.__dwf_rh');
    if (rh) rh.remove();
    el.removeEventListener('mousedown', onMouseDown);
  }

  function onMouseDown(e) {
    if (e.target.classList.contains('__dwf_rh')) return;
    e.preventDefault();
    var el = e.currentTarget;
    selectEl(el);
    drag = el;
    sx = e.clientX; sy = e.clientY;
    st = parseFloat(el.style.top)  || 0;
    sl = parseFloat(el.style.left) || 0;
  }

  function selectEl(el) {
    document.querySelectorAll('.__dwf_sel').forEach(function(e) { e.classList.remove('__dwf_sel'); });
    el.classList.add('__dwf_sel');
    selected = el;
    var id = el.getAttribute('data-dwf-id');
    var cfg = EDIT_ELEMENTS.find(function(c) { return c.id === id; });
    updateInfo(el, cfg);
  }

  document.addEventListener('mousemove', function(e) {
    if (drag) {
      drag.style.top  = (st + (e.clientY - sy)) + 'px';
      drag.style.left = (sl + (e.clientX - sx)) + 'px';
      updateInfo(drag, EDIT_ELEMENTS.find(function(c) { return c.id === drag.getAttribute('data-dwf-id'); }));
    }
    if (rsz) {
      rsz.style.width  = Math.max(40, sw + (e.clientX - sx)) + 'px';
      rsz.style.height = Math.max(20, sh + (e.clientY - sy)) + 'px';
      updateInfo(rsz, EDIT_ELEMENTS.find(function(c) { return c.id === rsz.getAttribute('data-dwf-id'); }));
    }
  });

  document.addEventListener('mouseup', function() {
    if (drag || rsz) {
      var el = drag || rsz;
      var id = el.getAttribute('data-dwf-id');
      overrides[id] = { top: el.style.top, left: el.style.left, width: el.style.width, height: el.style.height };
    }
    drag = null; rsz = null;
  });

  function applyProp(el, key, value) {
    var id = el.getAttribute('data-dwf-id');
    if (!overrides[id]) overrides[id] = {};
    el.style[key] = value ? (parseFloat(value) + 'px') : '';
    overrides[id][key] = el.style[key];
    updateInfo(el, EDIT_ELEMENTS.find(function(c) { return c.id === id; }));
  }

  function resetEl(el) {
    var id = el.getAttribute('data-dwf-id');
    ['top','left','width','height'].forEach(function(p) { el.style[p] = ''; });
    delete overrides[id];
    updateInfo(el, EDIT_ELEMENTS.find(function(c) { return c.id === id; }));
  }

  function resetAll() {
    EDIT_ELEMENTS.forEach(function(cfg) {
      var el = document.querySelector(cfg.sel);
      if (el) ['top','left','width','height'].forEach(function(p) { el.style[p] = ''; });
    });
    overrides = {};
    if (selected) updateInfo(selected, EDIT_ELEMENTS.find(function(c) { return c.id === selected.getAttribute('data-dwf-id'); }));
  }

  // ── SAVE ──
  function saveHTML() {
    // Build CSS override block
    var cssLines = ['\n/* ── DWF EDITOR OVERRIDES ── */'];
    var hasAny = false;
    EDIT_ELEMENTS.forEach(function(cfg) {
      var ov = overrides[cfg.id];
      if (!ov) return;
      var props = [];
      if (ov.top || ov.left) props.push('  position: relative;');
      if (ov.top)    props.push('  top: '    + ov.top    + ';');
      if (ov.left)   props.push('  left: '   + ov.left   + ';');
      if (ov.width)  props.push('  width: '  + ov.width  + ';');
      if (ov.height) props.push('  height: ' + ov.height + ';');
      if (props.length) { hasAny = true; cssLines.push(cfg.sel + ' {'); cssLines = cssLines.concat(props); cssLines.push('}'); }
    });
    cssLines.push('/* ── END OVERRIDES ── */');

    var html = document.documentElement.outerHTML;
    // Strip previous override block
    html = html.replace(/\n?\/\* ── DWF EDITOR OVERRIDES ── \*\/[\s\S]*?\/\* ── END OVERRIDES ── \*\//g, '');
    if (hasAny) html = html.replace('</style>', cssLines.join('\n') + '\n</style>');

    var blob = new Blob([html], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'web-desin-main.html';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ── TOGGLE ──
  function enableEdit() {
    editActive = true;
    document.head.appendChild(styleEl);
    makeBar();
    makeInfo();
    EDIT_ELEMENTS.forEach(activateEl);
  }

  function disableEdit() {
    editActive = false;
    if (styleEl.parentNode) styleEl.parentNode.removeChild(styleEl);
    var bar = document.getElementById('__dwf_bar');
    var info = document.getElementById('__dwf_info');
    if (bar) bar.remove();
    if (info) info.remove();
    EDIT_ELEMENTS.forEach(deactivateEl);
    selected = null;
  }

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'E') {
      e.preventDefault();
      editActive ? disableEdit() : enableEdit();
    }
  });
})();
</script>
